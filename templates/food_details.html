{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>{{ food.food_name }}</title>

<style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#fff8f4,#f5f7fa);
            min-height:100vh;
        }

        /* Main Container */

        .food-details{
            width:90%;
            max-width:1200px;
            margin:60px auto;
            display:flex;
            align-items:center;
            gap:60px;
            background:#fff;
            border-radius:25px;
            padding:40px;
            box-shadow:0 15px 40px rgba(0,0,0,.12);
        }

        /* Image */

        .food-image{
            flex:1;
        }

        .food-image img{
            width:100%;
            height:520px;
            object-fit:cover;
            border-radius:20px;
            transition:.4s;
            box-shadow:0 15px 35px rgba(0,0,0,.15);
        }

        .food-image img:hover{
            transform:scale(1.04);
        }

        /* Right Side */

        .food-content{
            flex:1;
        }

        .food-content h1{
            font-size:48px;
            color:#222;
            margin-bottom:10px;
            font-weight:700;
        }

        .food-content h2{
            color:#ff6b35;
            font-size:38px;
            margin-bottom:20px;
            font-weight:700;
        }

        /* Category */

        .category{
            display:inline-block;
            background:#fff2eb;
            color:#ff6b35;
            padding:10px 20px;
            border-radius:50px;
            font-size:15px;
            font-weight:600;
            margin-bottom:20px;
        }

        /* Rating */

        .rating{
            display:inline-flex;
            align-items:center;
            gap:8px;
            background:#28a745;
            color:#fff;
            padding:10px 18px;
            border-radius:50px;
            font-size:16px;
            font-weight:600;
            margin-bottom:20px;
        }

        /* Time */

        .time{
            display:flex;
            align-items:center;
            gap:10px;
            color:#666;
            font-size:18px;
            margin-bottom:25px;
        }

        /* Description */

        .food-content p{
            color:#555;
            font-size:17px;
            line-height:32px;
            margin-bottom:35px;
        }

        /* Add to Cart Button */

        .cart-btn{
            display:inline-block;
            text-decoration:none;
            background:#ff6b35;
            color:#fff;
            padding:18px 40px;
            border-radius:50px;
            font-size:18px;
            font-weight:600;
            transition:.3s;
            box-shadow:0 10px 25px rgba(255,107,53,.35);
        }

        .cart-btn:hover{
            background:#e55a25;
            transform:translateY(-4px);
            box-shadow:0 15px 35px rgba(255,107,53,.45);
        }

        /* Extra Info */

        .info-box{
            display:flex;
            gap:20px;
            margin:30px 0;
            flex-wrap:wrap;
        }

        .info-item{
            background:#fafafa;
            border:1px solid #eee;
            border-radius:15px;
            padding:15px 20px;
            min-width:130px;
            text-align:center;
        }

        .info-item h3{
            color:#ff6b35;
            margin-bottom:5px;
            font-size:20px;
        }

        .info-item p{
            margin:0;
            color:#666;
            font-size:14px;
        }

        /* ==========================================
        RESPONSIVE DESIGN
        ========================================== */

        /* Large Laptop */

        @media screen and (max-width:1200px){

            .food-details{
                width:95%;
                gap:40px;
            }

            .food-image img{
                height:460px;
            }

            .food-content h1{
                font-size:42px;
            }

            .food-content h2{
                font-size:34px;
            }

        }

        /* Tablet */

        @media screen and (max-width:992px){

            .food-details{
                flex-direction:column;
                text-align:center;
                padding:30px;
                gap:35px;
            }

            .food-image{
                width:100%;
            }

            .food-image img{
                width:100%;
                height:420px;
            }

            .food-content{
                width:100%;
            }

            .food-content h1{
                font-size:38px;
            }

            .food-content h2{
                font-size:30px;
            }

            .food-content p{
                font-size:16px;
                line-height:28px;
            }

            .time{
                justify-content:center;
            }

            .info-box{
                justify-content:center;
            }

        }

        /* Mobile */

        @media screen and (max-width:768px){

            body{
                padding:20px 0;
            }

            .food-details{
                width:95%;
                padding:25px 20px;
                border-radius:18px;
            }

            .food-image img{
                height:320px;
                border-radius:15px;
            }

            .food-content h1{
                font-size:32px;
            }

            .food-content h2{
                font-size:28px;
            }

            .category{
                font-size:14px;
                padding:8px 18px;
            }

            .rating{
                font-size:14px;
                padding:8px 15px;
            }

            .time{
                justify-content:center;
                font-size:16px;
            }

            .food-content p{
                font-size:15px;
                line-height:26px;
            }

            .info-box{
                flex-direction:column;
                gap:15px;
            }

            .info-item{
                width:100%;
            }

            .cart-btn{
                width:100%;
                text-align:center;
                padding:16px;
            }

        }

        /* Small Mobile */

        @media screen and (max-width:480px){

            .food-details{
                width:96%;
                padding:18px;
                margin:25px auto;
            }

            .food-image img{
                height:250px;
            }

            .food-content h1{
                font-size:28px;
            }

            .food-content h2{
                font-size:24px;
            }

            .category{
                display:block;
                width:fit-content;
                margin:0 auto 15px;
            }

            .rating{
                display:flex;
                justify-content:center;
                width:fit-content;
                margin:0 auto 15px;
            }

            .time{
                justify-content:center;
                margin-bottom:20px;
            }

            .food-content p{
                font-size:14px;
                line-height:24px;
            }

            .info-item h3{
                font-size:18px;
            }

            .info-item p{
                font-size:13px;
            }

            .cart-btn{
                font-size:16px;
            }

        }

        /* Very Small Mobile */

        @media screen and (max-width:360px){

            .food-image img{
                height:200px;
            }

            .food-content h1{
                font-size:24px;
            }

            .food-content h2{
                font-size:22px;
            }

            .food-content p{
                font-size:13px;
            }

            .cart-btn{
                padding:14px;
                font-size:15px;
            }

        }
     </style>
</head>
<body>

<div class="food-details">

    <div class="food-image">

        <img src="{{ food.image.url }}" alt="{{ food.food_name }}">

    </div>

    <div class="food-content">

        <h1>{{ food.food_name }}</h1>

        <h2>₹{{ food.price }}</h2>

        <div class="category">

            {{ food.category.category_name }}

        </div>

        <div class="rating">

            ⭐⭐⭐⭐⭐

        </div>

        <div class="time">

            ⏱️ 15 Minutes

        </div>

        <p>

            {{ food.description }}

        </p>

        

        <a href="{% url 'add_to_cart' food.id %}" class="cart-btn">
            Add To Cart
        </a>

    </div>

</div>

</body>
</html>
