<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Print QR Cards</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap"
rel="stylesheet">

<style>

*{
    font-family:Poppins,sans-serif;
}

body{
    background:#f4f4f4;
}

.header{

    background:#ff6b35;

    color:white;

    padding:20px;

    text-align:center;

    margin-bottom:30px;

}

.cards{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:25px;

}

.qr-card{

    background:white;

    border-radius:20px;

    padding:25px;

    text-align:center;

    border:2px solid #ddd;

    page-break-inside:avoid;

}

.logo{

    font-size:30px;

    font-weight:bold;

    color:#ff6b35;

}

.table-title{

    font-size:24px;

    margin:15px 0;

    font-weight:700;

}

.qr{

    margin:20px 0;
}

.qr img{

    width:180px;

    height:180px;

}

.scan{

    font-size:18px;

    color:#666;

}

.footer{

    margin-top:15px;

    font-size:13px;

    color:#999;

}

.buttons{

    text-align:center;

    margin:25px;

}

@media print{

.buttons{

display:none;

}

body{

background:white;

}

}

</style>

</head>

<body>

<div class="header">

<h2>

🍽 FOODIE HUB

</h2>

<h5>

Restaurant QR Cards

</h5>

</div>

<div class="container">

<div class="buttons">

<button onclick="window.print()"

class="btn btn-warning btn-lg">

<i class="fas fa-print"></i>

Print

</button>

</div>

<div class="cards">

{% for table in tables %}

<div class="qr-card">

<div class="logo">

🍽 FOODIE HUB

</div>

<hr>

<div class="table-title">

TABLE {{ table.table_number }}

</div>

<div class="qr">

{% if table.qr_code %}

<img src="{{ table.qr_code.url }}">

{% else %}

<p class="text-danger">

QR Not Generated

</p>

{% endif %}

</div>

<h5>

📱 Scan To Order Food

</h5>

<p class="scan">

No Waiting • Digital Menu • Fast Ordering

</p>

<div class="footer">

Thank You For Visiting ❤️

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
