<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ title }} | FoodieHub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
    min-height:100vh;
}

/* ================= HEADER ================= */

.page-header{

    background:linear-gradient(135deg,#ff6b35,#ff914d);

    color:#fff;

    padding:40px 20px;

    text-align:center;

    box-shadow:0 10px 25px rgba(0,0,0,.12);

}

.page-header h2{

    font-size:34px;

    font-weight:700;

    margin-bottom:8px;

}

.page-header p{

    margin:0;

    opacity:.9;

}

/* ================= FORM CARD ================= */

.form-card{

    background:#fff;

    border-radius:22px;

    overflow:hidden;

    box-shadow:0 15px 40px rgba(0,0,0,.10);

    margin-top:-30px;

}

.card-header{

    background:linear-gradient(135deg,#ff6b35,#ff914d);

    color:white;

    padding:25px;

}

.card-header h4{

    margin:0;

    font-weight:600;

}

.card-body{

    padding:35px;

}

/* ================= FORM ================= */

label{

    font-weight:600;

    margin-bottom:8px;

    color:#444;

}

input,
select{

    width:100%;

    height:50px;

    border-radius:12px !important;

    border:1px solid #ddd !important;

    padding:10px 15px;

    transition:.3s;

}

input:focus,
select:focus{

    border-color:#ff6b35 !important;

    box-shadow:0 0 12px rgba(255,107,53,.25) !important;

}

/* ================= INFO BOX ================= */

.info-box{

    background:#fff8f4;

    border-left:5px solid #ff6b35;

    border-radius:12px;

    padding:18px;

    margin-bottom:25px;

    color:#666;

}

/* ================= BUTTONS ================= */

.button-group{

    display:flex;

    justify-content:space-between;

    gap:15px;

    margin-top:30px;

}

.btn-save{

    background:#ff6b35;

    color:white;

    border:none;

    padding:13px 35px;

    border-radius:50px;

    font-weight:600;

    transition:.3s;

}

.btn-save:hover{

    background:#e85b28;

    color:white;

    transform:translateY(-2px);

}

.btn-back{

    background:#6c757d;

    color:white;

    border-radius:50px;

    padding:13px 35px;

    text-decoration:none;

    font-weight:600;

    transition:.3s;

}

.btn-back:hover{

    background:#495057;

    color:white;

    transform:translateY(-2px);

}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

.page-header{

    padding:30px 15px;

}

.page-header h2{

    font-size:28px;

}

.card-body{

    padding:25px;

}

.button-group{

    flex-direction:column-reverse;

}

.btn-save,
.btn-back{

    width:100%;

    text-align:center;

}

}

</style>

</head>

<body>

<div class="page-header">

<h2>

<i class="fas fa-chair"></i>

{{ title }}

</h2>

<p>

FoodieHub Restaurant Management System

</p>

</div>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-7 col-md-9">

<div class="form-card">

<div class="card-header">

<h4>

<i class="fas fa-table"></i>

{{ title }}

</h4>

</div>

<div class="card-body">

<div class="info-box">

<i class="fas fa-circle-info text-warning"></i>

Enter the restaurant table information below. This table can later be assigned a QR code for customer ordering.

</div>

<form method="POST">

{% csrf_token %}

<div class="mb-4">

<label>

<i class="fas fa-hashtag text-warning"></i>

Table Number

</label>

{{ form.table_number }}

</div>

<div class="mb-4">

<label>

<i class="fas fa-circle-check text-warning"></i>

Status

</label>

{{ form.status }}

</div>

<div class="button-group">

<a href="{% url 'table_list' %}" class="btn-back">

<i class="fas fa-arrow-left"></i>

Back

</a>

<button type="submit" class="btn-save">

<i class="fas fa-floppy-disk"></i>

Save Table

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
